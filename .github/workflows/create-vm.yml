name: Try to Create OCI VM
# Runs every 5 minutes. Note: GitHub Actions cron has a minimum effective
# interval of ~5 min and may be delayed/skipped during peak load.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

env:
  # 1. Suppress warnings to keep logs clean
  SUPPRESS_LABEL_WARNING: true

  # 2. San Jose Configuration (Verified)
  OCI_CLI_REGION: "us-sanjose-1"
  AD_NAME: "rLqN:US-SANJOSE-1-AD-1"
  SUBNET_ID: "ocid1.subnet.oc1.us-sanjose-1.aaaaaaaadfbehebwrmbpogslur562n6isjdxfioaksaxs2sc3avfbwbf7brq"

  # Image is resolved dynamically at runtime to the latest ARM-compatible
  # Canonical Ubuntu 22.04 image for VM.Standard.A1.Flex. Override by
  # setting an explicit IMAGE_ID here.
  IMAGE_OS: "Canonical Ubuntu"
  IMAGE_OS_VERSION: "22.04"

  # 3. Secrets
  COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Cache pip packages
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-pip-oci-cli-v1

      - name: Add OCI CLI to path
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup OCI CLI and Try to Create VM
        id: create_vm
        continue-on-error: true
        env:
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          set -o pipefail

          # Install OCI CLI
          pip install oci-cli

          # Create Directory
          mkdir -p /home/runner/.oci

          # Write Key File (use env var to safely handle multi-line PEM)
          printf '%s\n' "$OCI_CLI_KEY_CONTENT" > /home/runner/.oci/oci_api_key.pem
          chmod 600 /home/runner/.oci/oci_api_key.pem

          # Sanitize single-line secrets:
          #   - take only the first non-empty line
          #   - strip CR and surrounding whitespace
          # This protects against secrets that were pasted with trailing
          # newlines, CRLF endings, or (accidentally) multi-line content.
          clean() {
            printf '%s' "$1" | tr -d '\r' | awk 'NF{print; exit}' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g'
          }
          OCI_CLI_USER_CLEAN=$(clean "$OCI_CLI_USER")
          OCI_CLI_TENANCY_CLEAN=$(clean "$OCI_CLI_TENANCY")
          OCI_CLI_FINGERPRINT_CLEAN=$(clean "$OCI_CLI_FINGERPRINT")
          OCI_CLI_REGION_CLEAN=$(clean "$OCI_CLI_REGION")

          # Fail fast with a clear message if any secret looks wrong.
          if [[ ! "$OCI_CLI_USER_CLEAN" =~ ^ocid1\.user\. ]]; then
            echo "❌ secrets.OCI_CLI_USER must be a single OCID starting with 'ocid1.user.' — got something else (possibly multi-line)."
            exit 1
          fi
          if [[ ! "$OCI_CLI_TENANCY_CLEAN" =~ ^ocid1\.tenancy\. ]]; then
            echo "❌ secrets.OCI_CLI_TENANCY must be a single OCID starting with 'ocid1.tenancy.'."
            exit 1
          fi
          if [[ ! "$OCI_CLI_FINGERPRINT_CLEAN" =~ ^([0-9a-f]{2}:){15}[0-9a-f]{2}$ ]]; then
            echo "❌ secrets.OCI_CLI_FINGERPRINT must be a 16-byte colon-separated hex fingerprint."
            exit 1
          fi

          # Write Config File (Absolute Paths)
          {
            echo "[DEFAULT]"
            echo "user=$OCI_CLI_USER_CLEAN"
            echo "tenancy=$OCI_CLI_TENANCY_CLEAN"
            echo "fingerprint=$OCI_CLI_FINGERPRINT_CLEAN"
            echo "key_file=/home/runner/.oci/oci_api_key.pem"
            echo "region=$OCI_CLI_REGION_CLEAN"
          } > /home/runner/.oci/config

          # Show config structure (keys only, values masked) for debugging.
          echo "--- /home/runner/.oci/config (keys only) ---"
          awk -F= 'NF{print $1"=***"}' /home/runner/.oci/config
          echo "--- end ---"

          # Write SSH Key (use env var to safely handle any content)
          printf '%s\n' "$SSH_PUBLIC_KEY" > /home/runner/my_ssh_key.pub

          # Resolve the latest ARM-compatible image for the chosen OS,
          # unless IMAGE_ID is explicitly provided.
          if [[ -z "${IMAGE_ID:-}" ]]; then
            echo "Resolving latest $IMAGE_OS $IMAGE_OS_VERSION image for VM.Standard.A1.Flex..."
            IMAGE_ID=$(oci compute image list \
              --compartment-id "$COMPARTMENT_ID" \
              --operating-system "$IMAGE_OS" \
              --operating-system-version "$IMAGE_OS_VERSION" \
              --shape "VM.Standard.A1.Flex" \
              --sort-by TIMECREATED \
              --sort-order DESC \
              --limit 1 \
              --query 'data[0].id' \
              --raw-output)
            if [[ -z "$IMAGE_ID" || "$IMAGE_ID" == "null" ]]; then
              echo "❌ Could not find an ARM image for $IMAGE_OS $IMAGE_OS_VERSION in $OCI_CLI_REGION."
              exit 1
            fi
            echo "Using image: $IMAGE_ID"
          fi

          # Launch VM
          OCI_OUTPUT=$(oci compute instance launch \
            --compartment-id "$COMPARTMENT_ID" \
            --availability-domain "$AD_NAME" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":2,"memoryInGBs":12}' \
            --subnet-id "$SUBNET_ID" \
            --image-id "$IMAGE_ID" \
            --ssh-authorized-keys-file "/home/runner/my_ssh_key.pub" \
            --assign-public-ip true \
            --display-name "coolify-vm" \
            --boot-volume-size-in-gbs 200 2>&1 || true)

          # Store Log for Discord
          echo "log_data<<EOF" >> $GITHUB_OUTPUT
          echo "$OCI_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # --- SMART CHECK LOGIC ---
          if echo "$OCI_OUTPUT" | grep -q '"lifecycle-state": "PROVISIONING"'; then
            echo "✅ VICTORY! VM is being created."
            exit 0
          elif echo "$OCI_OUTPUT" | grep -q 'Out of host capacity'; then
            echo "⚠️  Oracle is full (Capacity Error). This is expected. Retrying next time..."
            # We exit with 0 so GitHub does not disable the cron schedule
            exit 0
          else
            echo "❌ Real Error Detected. Failing the workflow."
            exit 1
          fi

      - name: Send Discord Notification
        if: always()
        uses: sarisia/actions-status-discord@v1.15.4
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Set color: Green for Success, Orange for Capacity Wait, Red for Error
          color: ${{ steps.create_vm.outcome == 'success' && '0x28a745' || '0xdc3545' }}
          title: "OCI Bot Status"
          description: |
            **Result:**
            ${{ contains(steps.create_vm.outputs.log_data, 'Out of host capacity') && '⏳ Waiting for Capacity...' || contains(steps.create_vm.outputs.log_data, 'PROVISIONING') && '🚀 VM CREATED! DISABLE WORKFLOW!' || '❌ Error' }}

            **Details:**
            ```json
            ${{ steps.create_vm.outputs.log_data }}
            ```
